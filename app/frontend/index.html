<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GitOps Web Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>🚀 GitOps Demo Dashboard</h1>
    <p class="subtitle">
      Frontend → Backend via Kubernetes & Argo CD
    </p>

    <div class="card">
      <h2>Backend Status</h2>
      <p id="status" class="status idle">Not checked yet</p>

      <button onclick="callBackend()">Check Backend</button>
    </div>

    <div class="card log">
      <h2>Event Log</h2>
      <ul id="log"></ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
